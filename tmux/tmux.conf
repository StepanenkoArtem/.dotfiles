set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-a
bind s choose-tree -sZ -O name
set -g base-index 1
setw -g pane-base-index 1

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

set -g mode-keys vi
set -g mouse on

bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5
bind -r m resize-pane -Z

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Toggle between the two most-recently-used windows (like alt-tab)
bind -n M-Tab last-window   # alt+Tab, no prefix
bind Tab last-window        # ctrl+a then Tab

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'cristoomey/vim-tmux-navigator'

set -g @powerkit_theme "osaka-jade"
set -g @powerkit_theme_variant "default"
set -g @powerkit_plugins "datetime,battery,cpu,memory,temperature,git,github,hostname"
set -g @powerkit_separator_style "normal"
set -g @powerkit_elements_spacing "both"
set -g @powerkit_edge_separator_style "same"
set -g @powerkit_initial_separator_style "same"

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}:#{pane_current_command}"
set -g allow-rename off

# Only auto-rename sessions with default numeric names (keeps "main" stable for Ghostty auto-attach)
set-hook -g session-created 'if -F "#{m:[0-9]*,#{session_name}}" "rename-session \"#{user}-#{session_id}\""'

set -g status-position top
run '~/.tmux/plugins/tpm/tpm'

if-shell '[[ ! $TERM =~ (screen|tmux) ]]' 'new-session \; split-window -h \; resize-pane -D 40%'
